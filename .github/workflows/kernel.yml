name: APTKernel — alioth Builder

on:
  workflow_dispatch:
    inputs:
      ROOT_MANAGER:
        description: 'Root Manager'
        required: true
        type: choice
        options:
          - KernelSU
          - ReSukiSU
          - SukiSU-Ultra
          - None
        default: 'ReSukiSU'
      SUSFS:
        description: 'Enable SuSFS'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    name: Build APTKernel for alioth
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout Config
        uses: actions/checkout@v4
        with:
          path: apt-config

      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git curl wget zip unzip bc bison flex \
            libssl-dev libelf-dev python3 python-is-python3 \
            make gcc cpio ccache lz4 zstd \
            dwarves pahole pkg-config \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi

      # ── ZyC Clang 15 — same version used in the working kernel ─
      - name: Setup ZyC Clang 15
        run: |
          mkdir -p ~/clang
          # Get correct download URL from ZyC's link file
          ZYC_URL=$(curl -s "https://raw.githubusercontent.com/ZyCromerZ/Clang/main/Clang-15-link.txt" | head -1)
          echo "Downloading: $ZYC_URL"
          wget -q --show-progress "$ZYC_URL" -O ~/clang/clang.tar.gz
          tar -xzf ~/clang/clang.tar.gz -C ~/clang
          rm ~/clang/clang.tar.gz
          echo "PATH=$HOME/clang/bin:$PATH" >> $GITHUB_ENV
          $HOME/clang/bin/clang --version

      # ── Kernel Source — AstideLabs (same source as working kernel) ─
      - name: Clone Kernel Source
        run: |
          git clone --depth=1 \
            -b android16-aptusitu-new \
            https://github.com/AstideLabs/android_kernel_xiaomi_sm8250 \
            kernel-source
          cd kernel-source
          echo "KERNEL_VERSION=$(make kernelversion)" >> $GITHUB_ENV
          echo "Source: $(make kernelversion) ✅"

      # ── Root Manager ──────────────────────────────────────────
      - name: Integrate KernelSU
        if: ${{ github.event.inputs.ROOT_MANAGER == 'KernelSU' }}
        run: |
          cd kernel-source
          KSU_TAG=$(curl -s "https://api.github.com/repos/tiann/KernelSU/releases/latest" | grep '"tag_name"' | cut -d'"' -f4)
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s $KSU_TAG

      - name: Integrate ReSukiSU
        if: ${{ github.event.inputs.ROOT_MANAGER == 'ReSukiSU' }}
        run: |
          cd kernel-source
          curl -LSs "https://raw.githubusercontent.com/rsuntk/KernelSU/main/kernel/setup.sh" | bash -

      - name: Integrate SukiSU-Ultra
        if: ${{ github.event.inputs.ROOT_MANAGER == 'SukiSU-Ultra' }}
        run: |
          cd kernel-source
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -

      # ── SuSFS ─────────────────────────────────────────────────
      - name: Integrate SuSFS
        if: ${{ github.event.inputs.SUSFS == 'true' && github.event.inputs.ROOT_MANAGER != 'None' }}
        run: |
          cd kernel-source
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git /tmp/susfs4ksu
          for patch in /tmp/susfs4ksu/kernel_patches/4.19/*.patch; do
            [ -f "$patch" ] && git apply "$patch" 2>/dev/null && echo "✅ $(basename $patch)" || echo "⚠️ skip $(basename $patch)"
          done
          cp /tmp/susfs4ksu/fs/susfs.c fs/ 2>/dev/null || true
          cp /tmp/susfs4ksu/include/linux/susfs.h include/linux/ 2>/dev/null || true

      # ── APT Patches ───────────────────────────────────────────
      - name: Apply APT Patches
        run: |
          cd kernel-source
          for patch in ../apt-config/*.patch; do
            [ -f "$patch" ] || continue
            git apply "$patch" 2>/dev/null && echo "✅ $(basename $patch)" || echo "⚠️ skip $(basename $patch)"
          done

      # ── defconfig ─────────────────────────────────────────────
      - name: Copy defconfig
        run: |
          cp apt-config/apt_alioth_defconfig kernel-source/arch/arm64/configs/

      # ── Build — same flags as working kernel ──────────────────
      - name: Build Kernel
        run: |
          cd kernel-source
          export PATH="$HOME/clang/bin:$PATH"
          export KBUILD_BUILD_USER="APT"
          export KBUILD_BUILD_HOST="APTKernel"

          # GNU ld — same as working kernel (not ld.lld)
          args=(
            -j$(nproc --all)
            O=out
            ARCH=arm64
            CC=$HOME/clang/bin/clang
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-
            AR=$HOME/clang/bin/llvm-ar
            NM=$HOME/clang/bin/llvm-nm
            OBJCOPY=$HOME/clang/bin/llvm-objcopy
            OBJDUMP=$HOME/clang/bin/llvm-objdump
            STRIP=$HOME/clang/bin/llvm-strip
            LLVM=1
            LLVM_IAS=1
          )

          make "${args[@]}" apt_alioth_defconfig
          make "${args[@]}" 2>&1 | tee /tmp/build.log

          if [ -f out/arch/arm64/boot/Image ]; then
            echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
            echo "✅ Build successful!"
          else
            echo "BUILD_SUCCESS=false" >> $GITHUB_ENV
            tail -80 /tmp/build.log
            exit 1
          fi

      # ── Package ───────────────────────────────────────────────
      - name: Package AnyKernel3
        if: env.BUILD_SUCCESS == 'true'
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 anykernel
          cp kernel-source/out/arch/arm64/boot/Image anykernel/
          cp kernel-source/out/arch/arm64/boot/dts/qcom/*alioth*.dtbo anykernel/ 2>/dev/null || true
          sed -i 's/ExampleKernel/APTKernel/g' anykernel/anykernel.sh
          sed -i 's/=maguro/=alioth/g' anykernel/anykernel.sh
          cd anykernel
          ZIP="APTKernel-$(date +%Y%m%d)-alioth-${{ github.event.inputs.ROOT_MANAGER }}.zip"
          zip -r9 "../$ZIP" . -x "*.git*"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: APTKernel-alioth
          path: APTKernel-*.zip
          retention-days: 30

      - name: Create Release
        if: env.BUILD_SUCCESS == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: APTKernel-${{ github.run_number }}
          name: "APTKernel — alioth | ${{ github.event.inputs.ROOT_MANAGER }}"
          body: |
            ## APTKernel — Poco F3 (alioth)
            **Root:** ${{ github.event.inputs.ROOT_MANAGER }}
            **SuSFS:** ${{ github.event.inputs.SUSFS }}
            **Compiler:** ZyC Clang 15.0.7
            **Source:** AstideLabs/android_kernel_xiaomi_sm8250
          files: APTKernel-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
