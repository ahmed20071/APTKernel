name: APTKernel — alioth Builder

on:
  workflow_dispatch:
    inputs:
      ROOT_MANAGER:
        description: 'Root Manager'
        required: true
        type: choice
        options:
          - KernelSU
          - ReSukiSU
          - SukiSU-Ultra
          - None
        default: 'KernelSU'
      SUSFS:
        description: 'Enable SuSFS'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    name: Build APTKernel for alioth
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout Config
        uses: actions/checkout@v4
        with:
          path: apt-config

      # ── Root Manager Integration ──────────────────────────────
      - name: Clone Kernel + Integrate KernelSU
        if: ${{ github.event.inputs.ROOT_MANAGER == 'KernelSU' }}
        run: |
          git clone --depth=1 \
            -b alioth-r-oss \
            https://github.com/MiCode/Xiaomi_Kernel_OpenSource \
            kernel-source
          cd kernel-source
          KSU_TAG=$(curl -s "https://api.github.com/repos/tiann/KernelSU/releases/latest" | grep '"tag_name"' | cut -d'"' -f4)
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s $KSU_TAG
          echo "KernelSU $KSU_TAG integrated"

      - name: Clone Kernel + Integrate ReSukiSU
        if: ${{ github.event.inputs.ROOT_MANAGER == 'ReSukiSU' }}
        run: |
          git clone --depth=1 \
            -b alioth-r-oss \
            https://github.com/MiCode/Xiaomi_Kernel_OpenSource \
            kernel-source
          cd kernel-source
          curl -LSs "https://raw.githubusercontent.com/rsuntk/KernelSU/main/kernel/setup.sh" | bash -
          echo "ReSukiSU integrated"

      - name: Clone Kernel + Integrate SukiSU-Ultra
        if: ${{ github.event.inputs.ROOT_MANAGER == 'SukiSU-Ultra' }}
        run: |
          git clone --depth=1 \
            -b alioth-r-oss \
            https://github.com/MiCode/Xiaomi_Kernel_OpenSource \
            kernel-source
          cd kernel-source
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -
          echo "SukiSU-Ultra integrated"

      - name: Clone Kernel (No Root Manager)
        if: ${{ github.event.inputs.ROOT_MANAGER == 'None' }}
        run: |
          git clone --depth=1 \
            -b alioth-r-oss \
            https://github.com/MiCode/Xiaomi_Kernel_OpenSource \
            kernel-source

      # ── SuSFS ─────────────────────────────────────────────────
      - name: Integrate SuSFS
        if: ${{ github.event.inputs.SUSFS == 'true' && github.event.inputs.ROOT_MANAGER != 'None' }}
        run: |
          cd kernel-source
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git /tmp/susfs4ksu
          for patch in /tmp/susfs4ksu/kernel_patches/4.19/*.patch; do
            [ -f "$patch" ] && git apply "$patch" 2>/dev/null && echo "Applied: $patch" || true
          done
          cp /tmp/susfs4ksu/fs/susfs.c fs/ 2>/dev/null || true
          cp /tmp/susfs4ksu/include/linux/susfs.h include/linux/ 2>/dev/null || true

      # ── Apply APT Patches ─────────────────────────────────────
      - name: Apply APT Performance Patches
        run: |
          cd kernel-source
          for patch in ../apt-config/*.patch; do
            [ -f "$patch" ] || continue
            echo "Applying: $(basename $patch)"
            git apply "$patch" 2>/dev/null || true
          done

      # ── Copy defconfig ────────────────────────────────────────
      - name: Copy defconfig
        run: |
          cp apt-config/apt_alioth_defconfig kernel-source/arch/arm64/configs/

      # ── Build via kernel_build_action ─────────────────────────
      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: ./kernel-source/
          config: apt_alioth_defconfig
          arch: arm64
          aosp-gcc: true
          aosp-clang: true
          aosp-clang-version: r383902
          android-version: 12
          anykernel3: true
          anykernel3-url: https://github.com/osm0sis/AnyKernel3
          extra-config: 'CLANG_TRIPLE=aarch64-linux-gnu-'
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
